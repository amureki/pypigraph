<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pypigraph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; }
    #stats-bar {
      font-size: 0.7rem;
      color: #666;
      display: none;
      gap: 1rem;
      flex-wrap: wrap;
    }
    #stats-bar.active { display: flex; }
    #stats-bar .stat b { color: #1a1a1a; }

    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 320px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .sidebar-tab {
      flex: 1;
      padding: 0.45rem;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 0.75rem;
      color: #666;
      border-bottom: 2px solid transparent;
    }
    .sidebar-tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 500; }
    .sidebar-tab:hover { background: #f5f5f5; }
    .tab-panel { display: none; padding: 0.75rem; overflow-y: auto; flex: 1; }
    .tab-panel.active { display: block; }
    #sidebar-footer {
      padding: 0.5rem 0.75rem;
      border-top: 1px solid #e0e0e0;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    #sidebar-footer a { color: #2563eb; text-decoration: none; }
    #sidebar-footer a:hover { text-decoration: underline; }
    #sidebar-footer .sep { color: #ccc; }

    /* Input tab */
    #toml-input {
      width: 100%;
      height: 180px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    .input-group { margin-top: 0.5rem; }
    .input-group label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 0.2rem; }
    #url-input {
      width: 100%;
      padding: 0.35rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .input-controls {
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .input-controls label { font-size: 0.75rem; color: #555; }
    #go-btn {
      flex: 1;
      padding: 0.4rem 0.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
    }
    #go-btn:hover { background: #1d4ed8; }
    #go-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    #status {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #555;
      display: none;
    }
    #status.active { display: block; }
    #error {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #dc2626;
      display: none;
    }
    #error.active { display: block; }

    .examples { margin-top: 0.75rem; font-size: 0.7rem; color: #888; line-height: 1.6; }
    .examples p { margin: 0; }
    .examples a { color: #2563eb; cursor: pointer; text-decoration: none; }
    .examples a:hover { text-decoration: underline; }

    /* Module tab */
    .module-empty { color: #999; font-size: 0.8rem; padding: 1rem 0; text-align: center; }
    .detail-row { padding: 0.35rem 0; border-bottom: 1px solid #f0f0f0; }
    .detail-label { color: #888; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .detail-value { margin-top: 0.1rem; word-break: break-word; font-size: 0.8rem; }
    .detail-value a { color: #2563eb; text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }
    .dep-list { list-style: none; padding: 0; font-size: 0.75rem; }
    .dep-list li { padding: 0.2rem 0; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.7rem; }
    .license-ok { color: #16a34a; }
    .license-warn { color: #d97706; }
    .license-unknown { color: #dc2626; }

    /* Graph tab */
    .graph-stats { font-size: 0.8rem; }
    .graph-stats dt { color: #888; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 0.5rem; }
    .graph-stats dd { margin: 0.1rem 0 0; }
    .license-table { width: 100%; font-size: 0.75rem; border-collapse: collapse; margin-top: 0.25rem; }
    .license-table td { padding: 0.2rem 0.25rem; border-bottom: 1px solid #f0f0f0; }
    .license-table td:last-child { text-align: right; color: #888; }
    .license-row { cursor: pointer; }
    .license-row:hover { background: #f5f5f5; }
    .license-row td:first-child::before { content: "▸ "; font-size: 0.6rem; color: #999; }
    .license-row.expanded td:first-child::before { content: "▾ "; }
    .license-packages { display: none; }
    .license-packages.active { display: table-row; }
    .license-packages td { padding: 0.3rem 0.5rem; background: #fafafa; }
    .license-packages ul { list-style: none; padding: 0; margin: 0; }
    .license-packages li { padding: 0.15rem 0; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.7rem; cursor: pointer; color: #2563eb; }
    .license-packages li:hover { text-decoration: underline; }

    /* Graph area */
    #graph-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #graph-container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: grab;
    }
    #graph-container:active { cursor: grabbing; }
    #graph-container svg { user-select: none; -webkit-user-select: none; }
    #graph-container svg {
      transform-origin: 0 0;
    }
    #graph-container .node { cursor: pointer; }
    #graph-container .node:hover polygon,
    #graph-container .node:hover ellipse { stroke: #2563eb; stroke-width: 2; }
    #zoom-controls {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      display: none;
      flex-direction: column;
      gap: 2px;
      z-index: 10;
    }
    #zoom-controls.active { display: flex; }
    #zoom-controls button {
      width: 28px;
      height: 28px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #zoom-controls button:hover { background: #f0f0f0; }
    #layout-select, #color-select {
      width: fit-content;
      padding: 0.2rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.7rem;
      background: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>pypigraph</h1>
    <div id="stats-bar"></div>
  </header>
  <div id="main-area">
    <aside id="sidebar">
      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="input">Input</button>
        <button class="sidebar-tab" data-tab="graph">Graph</button>
        <button class="sidebar-tab" data-tab="module">Module</button>
      </div>
      <div id="tab-input" class="tab-panel active">
        <textarea id="toml-input" placeholder="Paste pyproject.toml contents..."></textarea>
        <div class="input-group">
          <label>Or fetch from URL</label>
          <input id="url-input" type="url" placeholder="https://github.com/user/repo/blob/main/pyproject.toml">
        </div>
        <div class="input-controls">
          <button id="go-btn">Build Graph</button>
        </div>
        <div id="status"></div>
        <div id="error"></div>
        <div class="examples">
          <p>For example:</p>
          <p>A URL to a pyproject.toml: <a class="example-link" data-url="https://raw.githubusercontent.com/python/pythondotorg/refs/heads/main/pyproject.toml">pythondotorg</a></p>
          <p>A package name: <a class="example-link" data-pkg="django">django</a></p>
          <p>Multiple packages: <a class="example-link" data-toml="django&#10;celery&#10;requests">django, celery, requests</a></p>
        </div>
      </div>
      <div id="tab-graph" class="tab-panel">
        <p class="module-empty">Build a graph first</p>
      </div>
      <div id="tab-module" class="tab-panel">
        <p class="module-empty">Click a package in the graph</p>
      </div>
      <div id="sidebar-footer">
        <span>by <a href="https://amureki.me" target="_blank">amureki</a></span>
        <span class="sep">|</span>
        <a href="https://github.com/amureki/pypigraph" target="_blank">GitHub</a>
        <span class="sep">|</span>
        <a href="https://github.com/sponsors/amureki" target="_blank">Sponsor</a>
      </div>
    </aside>
    <div id="graph-wrapper">
      <div id="graph-container"></div>
      <div id="zoom-controls">
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">&minus;</button>
        <button id="zoom-fit" title="Fit all">Fit</button>
        <button id="zoom-reset" title="1:1">1:1</button>
        <select id="layout-select" title="Layout">
          <option value="dot">Layout: Tree</option>
          <option value="twopi">Layout: Radial</option>
        </select>
        <select id="color-select" title="Color by">
          <option value="depth">Color: depth</option>
          <option value="freshness">Color: freshness</option>
          <option value="license">Color: license</option>
          <option value="size">Color: size</option>
        </select>
      </div>
    </div>
  </div>

  <script type="module">
    import { parse } from "https://cdn.jsdelivr.net/npm/smol-toml@1.3.1/+esm";
    import { Graphviz } from "https://cdn.jsdelivr.net/npm/@hpcc-js/wasm-graphviz@1.21.2/+esm";

    const graphviz = await Graphviz.load();

    const ROOT_ID = "__root__";

    function escapeHtml(str) {
      const el = document.createElement("span");
      el.textContent = str;
      return el.innerHTML;
    }

    // --- PEP 508 parsing ---
    function parsePep508(raw) {
      const match = raw.match(
        /^([A-Za-z0-9]([A-Za-z0-9._-]*[A-Za-z0-9])?)(\[([^\]]+)\])?\s*([^;]*?)(\s*;.*)?$/
      );
      if (!match) return { name: raw.trim(), extras: [], specifier: "", marker: "", raw };
      return {
        name: match[1],
        extras: match[4] ? match[4].split(",").map(e => e.trim()) : [],
        specifier: (match[5] || "").trim(),
        marker: match[6] ? match[6].replace(/^\s*;\s*/, "").trim() : "",
        raw,
      };
    }

    function normalizeName(name) {
      return name.toLowerCase().replace(/[-_.]+/g, "-");
    }

    function formatSize(bytes) {
      if (!bytes || bytes === 0) return "?";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function classifyLicense(license) {
      if (!license || license === "Unknown") return "license-unknown";
      return license.match(/MIT|BSD|Apache|ISC|PSF|LGPL|MPL/i) ? "license-ok" : "license-warn";
    }

    function errorPackage(name) {
      return { name, version: "?", summary: "", license: "", size: 0, releaseDate: "", dependencies: [], error: true };
    }

    // --- TOML parsing ---
    function parseToml(tomlString) {
      const doc = parse(tomlString);
      const deps = doc.project?.dependencies ?? [];
      if (deps.length === 0) throw new Error("No dependencies found in [project].dependencies");
      return { name: doc.project?.name || "project", dependencies: deps.map(parsePep508) };
    }

    // --- PyPI fetcher ---
    const cache = new Map();

    async function fetchPackageInfo(name) {
      const normalized = normalizeName(name);
      if (cache.has(normalized)) return cache.get(normalized);

      const promise = (async () => {
        try {
          const resp = await fetch(`https://pypi.org/pypi/${normalized}/json`);
          if (!resp.ok) return errorPackage(normalized);
          const data = await resp.json();
          const info = data.info;
          const requires = (info.requires_dist ?? [])
            .map(parsePep508)
            .filter(d => !d.marker.includes("extra ==") && !d.marker.includes("extra=="));

          let size = 0;
          const urls = data.urls ?? [];
          const wheel = urls.find(u => u.packagetype === "bdist_wheel");
          const sdist = urls.find(u => u.packagetype === "sdist");
          size = (wheel || sdist)?.size || 0;

          const uploadTime = (wheel || sdist)?.upload_time_iso_8601 || "";
          const releaseDate = uploadTime ? uploadTime.split("T")[0] : "";

          const licenseClassifier = (info.classifiers ?? []).find(c => c.startsWith("License ::"));
          let license = info.license_expression
            || (licenseClassifier ? licenseClassifier.split(" :: ").pop() : "")
            || info.license
            || "";
          if (license.length > 80) license = license.slice(0, 80) + "...";

          return {
            name: info.name,
            version: info.version,
            summary: info.summary || "",
            license,
            size,
            releaseDate,
            projectUrls: info.project_urls || {},
            requiresPython: info.requires_python || "",
            dependencies: requires,
            error: false,
          };
        } catch {
          return errorPackage(normalized);
        }
      })();

      cache.set(normalized, promise);
      return promise;
    }

    // --- Concurrency limiter ---
    function semaphore(max) {
      let active = 0;
      const queue = [];
      return function limit(fn) {
        return new Promise((resolve, reject) => {
          const run = async () => {
            active++;
            try { resolve(await fn()); } catch (e) { reject(e); } finally {
              active--;
              if (queue.length) queue.shift()();
            }
          };
          if (active < max) run(); else queue.push(run);
        });
      };
    }
    const limit = semaphore(8);

    // --- PEP 440 version comparison (simplified) ---
    function parseVersion(v) {
      return v.replace(/\.?(dev|alpha|beta|rc|post|a|b|c)\d*/gi, "")
        .split(".").map(Number);
    }

    function compareVersions(a, b) {
      const pa = parseVersion(a), pb = parseVersion(b);
      for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
        const diff = (pa[i] || 0) - (pb[i] || 0);
        if (diff !== 0) return diff;
      }
      return 0;
    }

    function satisfiesSpec(version, specifier) {
      if (!specifier) return true;
      const parts = specifier.split(",").map(s => s.trim());
      for (const part of parts) {
        const m = part.match(/^(~=|==|!=|<=?|>=?|===)(.+)$/);
        if (!m) continue;
        const [, op, target] = m;
        const cmp = compareVersions(version, target);
        if (op === ">=" && cmp < 0) return false;
        if (op === ">" && cmp <= 0) return false;
        if (op === "<=" && cmp > 0) return false;
        if (op === "<" && cmp >= 0) return false;
        if (op === "==" && cmp !== 0) return false;
        if (op === "!=" && cmp === 0) return false;
        if (op === "~=") {
          if (cmp < 0) return false;
          const tv = parseVersion(target);
          tv[tv.length - 2] = (tv[tv.length - 2] || 0) + 1;
          const upper = tv.map(String).join(".");
          if (compareVersions(version, upper) >= 0) return false;
        }
      }
      return true;
    }

    // --- Graph builder ---
    let lastGraph = null;

    async function buildGraph(rootDeps, projectName, maxDepth, onProgress) {
      const edgeSet = new Set();
      const edges = [];
      const nodes = new Map();

      nodes.set(ROOT_ID, { name: projectName, version: "", depth: 0, error: false, size: 0, license: "", dependencies: [], summary: "" });

      function addEdge(from, to) {
        const key = `${from}->${to}`;
        if (edgeSet.has(key)) return;
        edgeSet.add(key);
        edges.push({ from, to });
      }

      async function resolve(depName, parentKey, depth, specifier) {
        if (depth > maxDepth) return;
        const key = normalizeName(depName);
        addEdge(parentKey, key);
        if (nodes.has(key)) return;
        nodes.set(key, null); // reserve to prevent duplicate fetches

        onProgress(`Fetching ${depName}... (${nodes.size - 1} packages)`);
        const info = await limit(() => fetchPackageInfo(key));
        const pinnedBehind = specifier && info.version && !info.error
          ? !satisfiesSpec(info.version, specifier) : false;
        nodes.set(key, { ...info, depth, specifier: specifier || "", pinnedBehind });

        await Promise.all(
          info.dependencies.map(d => resolve(d.name, key, depth + 1, d.specifier))
        );
      }

      await Promise.all(
        rootDeps.map(d => resolve(d.name, ROOT_ID, 1, d.specifier))
      );

      return { nodes, edges };
    }

    // --- Coloring ---
    const depthColors = ["#22c55e", "#3b82f6", "#f59e0b", "#a855f7", "#ec4899"];

    function colorByDepth(node) {
      if (node.pinnedBehind) return "#d97706";
      return depthColors[Math.min(node.depth, depthColors.length - 1)];
    }

    function colorByFreshness(node) {
      if (!node.releaseDate || node.depth === 0) return "#94a3b8";
      const days = (Date.now() - new Date(node.releaseDate).getTime()) / 86400000;
      if (days < 90) return "#22c55e";       // < 3 months — green
      if (days < 365) return "#84cc16";      // < 1 year — lime
      if (days < 730) return "#f59e0b";      // < 2 years — amber
      return "#dc2626";                       // 2+ years — red
    }

    function colorByLicense(node) {
      if (node.depth === 0) return "#94a3b8";
      const lic = (node.license || "").toLowerCase();
      if (!lic || lic === "unknown") return "#dc2626";  // unknown — red
      if (/mit|bsd|apache|isc|psf|unlicense/.test(lic)) return "#22c55e";  // permissive — green
      if (/mpl/.test(lic)) return "#84cc16";             // weak copyleft — lime
      if (/lgpl/.test(lic)) return "#f59e0b";            // copyleft — amber
      if (/gpl|agpl/.test(lic)) return "#dc2626";        // strong copyleft — red
      return "#f59e0b";                                   // other — amber
    }

    function colorBySize(node) {
      if (node.depth === 0 || !node.size) return "#94a3b8";
      // compute max size from current graph
      let maxSize = 0;
      if (lastGraph) {
        for (const [id, n] of lastGraph.nodes) {
          if (n && id !== ROOT_ID && n.size > maxSize) maxSize = n.size;
        }
      }
      if (maxSize === 0) return "#94a3b8";
      const ratio = node.size / maxSize;
      if (ratio < 0.1) return "#22c55e";      // small — green
      if (ratio < 0.3) return "#84cc16";      // moderate — lime
      if (ratio < 0.6) return "#f59e0b";      // large — amber
      return "#dc2626";                        // very large — red
    }

    const colorModes = { depth: colorByDepth, freshness: colorByFreshness, license: colorByLicense, size: colorBySize };
    let currentColorMode = "depth";

    // --- DOT generation ---
    function escapeDot(str) {
      return str.replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    function graphToDot(graph, colorFn, engine) {
      const dependedBy = new Map();
      for (const { to } of graph.edges) {
        dependedBy.set(to, (dependedBy.get(to) || 0) + 1);
      }

      const isDot = engine === "dot";
      const lines = [
        `digraph G {`,
        `  rankdir=TB;`,
        `  bgcolor="transparent";`,
        `  ranksep=0.6;`,
        `  nodesep=0.4;`,
        `  splines=true;`,
        isDot ? `  newrank=true;` : "",
        !isDot ? `  overlap=prism;` : "",
        !isDot ? `  sep="+10";` : "",
        engine === "sfdp" ? `  K=1.2;` : "",
        `  node [shape=box, style="rounded,filled", fontname="system-ui, sans-serif", fontsize=11, margin="0.15,0.08"];`,
        `  edge [color="#6e7781", arrowsize=0.7, arrowhead=vee];`,
      ].filter(Boolean);

      for (const [id, node] of graph.nodes) {
        if (!node) continue;
        const count = dependedBy.get(id) || 0;
        const countLabel = count > 1 ? ` (${count})` : "";
        const dateLabel = node.releaseDate ? `\n${node.releaseDate}` : "";
        const sizeLabel = node.size ? `\n${formatSize(node.size)}` : "";
        const versionLabel = node.pinnedBehind ? node.specifier : (node.version || "");
        const nameVersion = versionLabel ? `${node.name}@${versionLabel}` : node.name;
        const labelParts = `${escapeDot(nameVersion)}${escapeDot(countLabel)}${dateLabel}${sizeLabel}`;
        const color = colorFn(node);
        const penwidth = node.depth === 0 ? 3 : count > 3 ? 2.5 : 1.5;
        const fontsize = node.depth === 0 ? 12 : node.depth > 2 ? 9 : node.depth > 1 ? 10 : 11;
        const style = node.error ? "rounded,filled,dashed" : "rounded,filled";
        const tooltip = escapeDot(node.summary || node.name);

        lines.push(`  "${escapeDot(id)}" [label="${labelParts}", fillcolor="${color}20", color="${node.error ? "#dc2626" : color}", penwidth=${penwidth}, fontsize=${fontsize}, style="${style}", tooltip="${tooltip}", id="${escapeDot(id)}"];`);
      }

      for (const { from, to } of graph.edges) {
        const weight = isDot && (dependedBy.get(to) || 0) > 3 ? 2 : 1;
        lines.push(`  "${escapeDot(from)}" -> "${escapeDot(to)}"${weight > 1 ? ` [weight=${weight}]` : ""};`);
      }

      lines.push(`}`);
      return lines.join("\n");
    }

    // --- SVG pan/zoom ---
    const svgState = { scale: 1, panX: 0, panY: 0, didDrag: false };
    let panZoomCleanup = null;

    function applyTransform() {
      const svg = document.getElementById("graph-container").querySelector("svg");
      if (svg) svg.style.transform = `translate(${svgState.panX}px, ${svgState.panY}px) scale(${svgState.scale})`;
    }

    function clampScale(s) { return Math.min(Math.max(s, 0.05), 5); }

    function zoomAt(cx, cy, factor) {
      const newScale = clampScale(svgState.scale * factor);
      const f = newScale / svgState.scale;
      svgState.panX = cx - (cx - svgState.panX) * f;
      svgState.panY = cy - (cy - svgState.panY) * f;
      svgState.scale = newScale;
      applyTransform();
    }

    function initPanZoom(container) {
      // Cleanup previous listeners
      if (panZoomCleanup) panZoomCleanup();

      const svg = container.querySelector("svg");
      if (!svg) return;
      svg.style.willChange = "transform";

      let dragging = false, startX = 0, startY = 0;
      // Touch state
      let lastTouchDist = 0, lastTouchMid = null;

      const ac = new AbortController();
      const opts = { signal: ac.signal };
      const optsPassive = { signal: ac.signal, passive: false };

      // Mouse wheel zoom
      container.addEventListener("wheel", (e) => {
        e.preventDefault();
        const delta = -e.deltaY * (e.deltaMode === 1 ? 20 : 1);
        const factor = Math.pow(1.002, delta);
        const rect = container.getBoundingClientRect();
        zoomAt(e.clientX - rect.left, e.clientY - rect.top, factor);
      }, optsPassive);

      // Mouse drag pan
      container.addEventListener("mousedown", (e) => {
        if (e.target.closest(".node")) return;
        dragging = true;
        svgState.didDrag = false;
        startX = e.clientX - svgState.panX;
        startY = e.clientY - svgState.panY;
      }, opts);
      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        svgState.didDrag = true;
        svgState.panX = e.clientX - startX;
        svgState.panY = e.clientY - startY;
        applyTransform();
      }, opts);
      window.addEventListener("mouseup", () => { dragging = false; }, opts);

      // Touch: pan + pinch zoom
      container.addEventListener("touchstart", (e) => {
        if (e.touches.length === 1 && !e.target.closest(".node")) {
          dragging = true;
          startX = e.touches[0].clientX - svgState.panX;
          startY = e.touches[0].clientY - svgState.panY;
        } else if (e.touches.length === 2) {
          dragging = false;
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          lastTouchDist = Math.hypot(dx, dy);
          const rect = container.getBoundingClientRect();
          lastTouchMid = {
            x: (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
            y: (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top,
          };
        }
      }, optsPassive);
      container.addEventListener("touchmove", (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && dragging) {
          svgState.panX = e.touches[0].clientX - startX;
          svgState.panY = e.touches[0].clientY - startY;
          applyTransform();
        } else if (e.touches.length === 2 && lastTouchDist) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.hypot(dx, dy);
          const factor = dist / lastTouchDist;
          zoomAt(lastTouchMid.x, lastTouchMid.y, factor);
          lastTouchDist = dist;
        }
      }, optsPassive);
      container.addEventListener("touchend", () => {
        dragging = false;
        lastTouchDist = 0;
        lastTouchMid = null;
      }, opts);

      panZoomCleanup = () => ac.abort();

      // Fit initially
      fitGraph();
    }

    function fitGraph() {
      const container = document.getElementById("graph-container");
      const svg = container.querySelector("svg");
      if (!svg) return;
      const cw = container.clientWidth, ch = container.clientHeight;
      const sw = parseFloat(svg.dataset.intrinsicWidth) || parseFloat(svg.style.width) || cw;
      const sh = parseFloat(svg.dataset.intrinsicHeight) || parseFloat(svg.style.height) || ch;
      svgState.scale = Math.min(cw / sw, ch / sh) * 0.95;
      svgState.panX = (cw - sw * svgState.scale) / 2;
      svgState.panY = (ch - sh * svgState.scale) / 2;
      svg.style.transform = `translate(${svgState.panX}px, ${svgState.panY}px) scale(${svgState.scale})`;
    }

    // --- Graphviz rendering ---
    let currentLayout = "dot";

    function renderGraph(graph) {
      const container = document.getElementById("graph-container");
      const colorFn = colorModes[currentColorMode];
      const dot = graphToDot(graph, colorFn, currentLayout);
      const svg = graphviz.layout(dot, "svg", currentLayout);
      container.innerHTML = svg;

      // Store intrinsic size, then let CSS handle display
      const svgEl = container.querySelector("svg");
      if (svgEl) {
        const w = svgEl.getAttribute("width");
        const h = svgEl.getAttribute("height");
        svgEl.dataset.intrinsicWidth = parseFloat(w) || 0;
        svgEl.dataset.intrinsicHeight = parseFloat(h) || 0;
        svgEl.style.width = (parseFloat(w) || 800) + "px";
        svgEl.style.height = (parseFloat(h) || 600) + "px";
        svgEl.removeAttribute("width");
        svgEl.removeAttribute("height");
      }

      initPanZoom(container);

      // Build lookup: node title → SVG element
      const nodesByTitle = new Map();
      container.querySelectorAll(".node").forEach(el => {
        const title = el.querySelector("title");
        if (title) nodesByTitle.set(title.textContent.trim(), el);
      });

      // Build lookup: edge title → SVG element, and adjacency from graph data
      const edgesByKey = new Map();
      container.querySelectorAll(".edge").forEach(el => {
        const title = el.querySelector("title");
        if (title) edgesByKey.set(title.textContent.trim(), el);
      });

      function getConnectedIds(nodeId) {
        const ids = new Set([nodeId]);
        // Walk upstream (predecessors)
        const upQueue = [nodeId];
        while (upQueue.length) {
          const cur = upQueue.shift();
          for (const { from, to } of graph.edges) {
            if (to === cur && !ids.has(from)) {
              ids.add(from);
              upQueue.push(from);
            }
          }
        }
        // Walk downstream (successors)
        const downQueue = [nodeId];
        while (downQueue.length) {
          const cur = downQueue.shift();
          for (const { from, to } of graph.edges) {
            if (from === cur && !ids.has(to)) {
              ids.add(to);
              downQueue.push(to);
            }
          }
        }
        return ids;
      }

      function highlightNode(nodeId) {
        const connectedIds = getConnectedIds(nodeId);

        // Dim all
        container.querySelectorAll(".node").forEach(el => el.style.opacity = "0.15");
        container.querySelectorAll(".edge").forEach(el => el.style.opacity = "0.05");

        // Highlight connected nodes
        for (const id of connectedIds) {
          const el = nodesByTitle.get(id);
          if (el) el.style.opacity = "1";
        }

        // Highlight edges between connected nodes
        for (const { from, to } of graph.edges) {
          if (connectedIds.has(from) && connectedIds.has(to)) {
            const key = `${from}->${to}`;
            const el = edgesByKey.get(key);
            if (el) {
              el.style.opacity = "1";
              // Color highlighted edges
              el.querySelectorAll("path, polygon").forEach(p => {
                p.setAttribute("stroke", "#2563eb");
              });
              el.querySelectorAll("polygon").forEach(p => {
                p.setAttribute("fill", "#2563eb");
              });
            }
          }
        }
      }

      function clearHighlight() {
        container.querySelectorAll(".node").forEach(n => n.style.opacity = "");
        container.querySelectorAll(".edge").forEach(el => {
          el.style.opacity = "";
          el.querySelectorAll("path, polygon").forEach(p => {
            p.setAttribute("stroke", "#6e7781");
          });
          el.querySelectorAll("polygon").forEach(p => {
            p.setAttribute("fill", "#6e7781");
          });
        });
      }

      // Click node → highlight + show module
      container.querySelectorAll(".node").forEach(nodeEl => {
        nodeEl.addEventListener("click", (e) => {
          e.stopPropagation();
          const title = nodeEl.querySelector("title");
          if (title) {
            const nodeId = title.textContent.trim();
            highlightNode(nodeId);
            showModule(nodeId);
          }
        });
      });

      // Click background → clear highlight (but not after dragging)
      container.addEventListener("click", (e) => {
        if (svgState.didDrag) return;
        if (!e.target.closest(".node")) clearHighlight();
      });
    }

    // --- Zoom controls ---
    document.getElementById("zoom-in").addEventListener("click", () => {
      const c = document.getElementById("graph-container");
      zoomAt(c.clientWidth / 2, c.clientHeight / 2, 1.3);
    });
    document.getElementById("zoom-out").addEventListener("click", () => {
      const c = document.getElementById("graph-container");
      zoomAt(c.clientWidth / 2, c.clientHeight / 2, 1 / 1.3);
    });
    document.getElementById("zoom-fit").addEventListener("click", fitGraph);
    document.getElementById("zoom-reset").addEventListener("click", () => {
      const container = document.getElementById("graph-container");
      const svg = container.querySelector("svg");
      if (!svg) return;
      const cw = container.clientWidth, ch = container.clientHeight;
      const sw = parseFloat(svg.dataset.intrinsicWidth) || parseFloat(svg.style.width) || cw;
      const sh = parseFloat(svg.dataset.intrinsicHeight) || parseFloat(svg.style.height) || ch;
      svgState.scale = 1;
      svgState.panX = (cw - sw) / 2;
      svgState.panY = (ch - sh) / 2;
      svg.style.transform = `translate(${svgState.panX}px, ${svgState.panY}px) scale(1)`;
    });

    document.getElementById("layout-select").addEventListener("change", (e) => {
      currentLayout = e.target.value;
      if (lastGraph) renderGraph(lastGraph);
    });
    document.getElementById("color-select").addEventListener("change", (e) => {
      currentColorMode = e.target.value;
      if (lastGraph) renderGraph(lastGraph);
    });

    // --- Stats ---
    function computeStats(graph) {
      let direct = 0, transitive = 0, errors = 0, totalSize = 0;
      const licenses = new Map();

      for (const [id, node] of graph.nodes) {
        if (!node || id === ROOT_ID) continue;
        if (node.depth === 1) direct++; else transitive++;
        if (node.error) errors++;
        totalSize += node.size || 0;
        const lic = node.license || "Unknown";
        licenses.set(lic, (licenses.get(lic) || 0) + 1);
      }

      return { direct, transitive, errors, totalSize, licenses };
    }

    function renderStatsBar(stats) {
      const bar = document.getElementById("stats-bar");
      bar.innerHTML = [
        `<span class="stat"><b>${stats.direct}</b> direct</span>`,
        `<span class="stat"><b>${stats.transitive}</b> transitive</span>`,
        `<span class="stat"><b>${stats.direct + stats.transitive}</b> total</span>`,
        `<span class="stat"><b>${formatSize(stats.totalSize)}</b> size</span>`,
        stats.errors > 0 ? `<span class="stat" style="color:#dc2626"><b>${stats.errors}</b> errors</span>` : "",
      ].join("");
      bar.classList.add("active");
    }

    function packagesByLicense(graph) {
      const map = new Map();
      for (const [id, node] of graph.nodes) {
        if (!node || id === ROOT_ID) continue;
        const lic = node.license || "Unknown";
        if (!map.has(lic)) map.set(lic, []);
        map.get(lic).push({ id, name: node.name });
      }
      return map;
    }

    function renderGraphTab(stats) {
      const tab = document.getElementById("tab-graph");
      const pkgsByLic = packagesByLicense(lastGraph);
      const sortedLicenses = [...stats.licenses.entries()].sort((a, b) => b[1] - a[1]);

      const licRows = sortedLicenses.map(([lic, count], i) => {
        const pkgs = pkgsByLic.get(lic) || [];
        const pkgItems = pkgs.map(p =>
          `<li data-pkg-id="${escapeHtml(p.id)}">${escapeHtml(p.name)}</li>`
        ).join("");
        return `<tr class="license-row" data-lic-idx="${i}"><td class="${classifyLicense(lic)}">${escapeHtml(lic || "Unknown")}</td><td>${count}</td></tr>` +
          `<tr class="license-packages" data-lic-idx="${i}"><td colspan="2"><ul>${pkgItems}</ul></td></tr>`;
      }).join("");

      tab.innerHTML = `
        <dl class="graph-stats">
          ${stats.errors > 0 ? `<dt>Fetch errors</dt><dd style="color:#dc2626">${stats.errors}</dd>` : ""}
          <dt>Licenses (${stats.licenses.size} unique)</dt>
          <dd><table class="license-table">${licRows}</table></dd>
        </dl>
      `;

      tab.querySelectorAll(".license-row").forEach(row => {
        row.addEventListener("click", () => {
          const idx = row.dataset.licIdx;
          const detail = tab.querySelector(`.license-packages[data-lic-idx="${idx}"]`);
          row.classList.toggle("expanded");
          detail.classList.toggle("active");
        });
      });

      tab.querySelectorAll(".license-packages li[data-pkg-id]").forEach(li => {
        li.addEventListener("click", () => {
          showModule(li.dataset.pkgId);
        });
      });
    }

    // --- Sidebar: Module tab ---
    function detailRow(label, value, extraClass = "") {
      return `<div class="detail-row"><div class="detail-label">${label}</div><div class="detail-value ${extraClass}">${value}</div></div>`;
    }

    function showModule(nodeId) {
      if (!lastGraph) return;
      const node = lastGraph.nodes.get(nodeId);
      if (!node || nodeId === ROOT_ID) return;

      const tab = document.getElementById("tab-module");

      const usedBy = lastGraph.edges.filter(e => e.to === nodeId).map(e => {
        const n = lastGraph.nodes.get(e.from);
        return n ? n.name : e.from;
      });

      const pypiUrl = `https://pypi.org/project/${encodeURIComponent(normalizeName(node.name))}/`;
      const urls = node.projectUrls || {};
      const linksHtml = Object.entries(urls).map(([k, v]) => {
        const safeUrl = v.match(/^https?:\/\//) ? v : "#";
        return `<a href="${escapeHtml(safeUrl)}" target="_blank">${escapeHtml(k)}</a>`;
      }).join(" &middot; ");

      const deps = node.dependencies || [];
      const depsHtml = deps.length === 0
        ? '<p style="color:#999;margin-top:0.5rem;">No dependencies</p>'
        : `<ul class="dep-list">${deps.map(d => `<li>${escapeHtml(d.raw)}</li>`).join("")}</ul>`;

      const versionHtml = node.pinnedBehind
        ? `${escapeHtml(node.version || "?")} <span style="color:#d97706;font-size:0.7rem;">(latest excluded by ${escapeHtml(node.specifier)})</span>`
        : escapeHtml(node.version || "?");

      const rows = [
        detailRow("Package", `<b>${escapeHtml(node.name)}</b>`),
        detailRow("Version", versionHtml),
        node.releaseDate ? detailRow("Released", escapeHtml(node.releaseDate)) : "",
        detailRow("Summary", escapeHtml(node.summary || "-")),
        detailRow("License", escapeHtml(node.license || "Unknown"), classifyLicense(node.license)),
        detailRow("Size", formatSize(node.size)),
      ];
      if (node.requiresPython) {
        rows.push(detailRow("Python requires", escapeHtml(node.requiresPython)));
      }
      rows.push(
        detailRow("Links", `<a href="${pypiUrl}" target="_blank">PyPI</a>${linksHtml ? " &middot; " + linksHtml : ""}`),
        detailRow(`Used by (${usedBy.length})`, escapeHtml(usedBy.join(", ") || "-")),
        `<div class="detail-row"><div class="detail-label">Dependencies (${deps.length})</div>${depsHtml}</div>`,
      );

      tab.innerHTML = rows.join("");
      switchTab("module");
    }

    // --- Tab switching ---
    function switchTab(name) {
      document.querySelectorAll(".sidebar-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
      document.querySelectorAll(".tab-panel").forEach(t => t.classList.toggle("active", t.id === "tab-" + name));
    }

    // --- UI wiring ---
    document.querySelectorAll(".sidebar-tab").forEach(tab => {
      tab.addEventListener("click", () => switchTab(tab.dataset.tab));
    });

    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.toggle("active", !!msg);
    }
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.toggle("active", !!msg);
    }

    async function getTomlInput() {
      const text = document.getElementById("toml-input").value.trim();
      if (text) return text;
      const url = document.getElementById("url-input").value.trim();
      if (url) {
        showStatus("Fetching pyproject.toml...");
        // Convert GitHub blob URLs to raw URLs
        const rawUrl = url
          .replace(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/(.+)$/, "https://raw.githubusercontent.com/$1/$2/refs/heads/$3")
          .replace(/^https:\/\/gitlab\.com\/([^/]+)\/([^/]+)\/-\/blob\/(.+)$/, "https://gitlab.com/$1/$2/-/raw/$3");
        const resp = await fetch(rawUrl);
        if (!resp.ok) throw new Error(`Failed to fetch URL: ${resp.status}`);
        return await resp.text();
      }
      throw new Error("Paste pyproject.toml contents or provide a URL");
    }

    async function runBuild() {
      const goBtn = document.getElementById("go-btn");
      showError("");
      goBtn.disabled = true;
      cache.clear();

      try {
        const toml = await getTomlInput();
        const parsed = parseToml(toml);

        const maxDepth = Infinity;
        const graph = await buildGraph(parsed.dependencies, parsed.name, maxDepth, showStatus);
        lastGraph = graph;

        showStatus("Rendering graph...");
        renderGraph(graph);
        document.getElementById("zoom-controls").classList.add("active");

        const stats = computeStats(graph);
        renderStatsBar(stats);
        renderGraphTab(stats);
        showStatus("");
        switchTab("graph");
      } catch (e) {
        showError(e.message);
        showStatus("");
      } finally {
        goBtn.disabled = false;
      }
    }

    document.getElementById("go-btn").addEventListener("click", runBuild);

    document.querySelectorAll(".example-link").forEach(link => {
      link.addEventListener("click", () => {
        const tomlInput = document.getElementById("toml-input");
        const urlInput = document.getElementById("url-input");
        tomlInput.value = "";
        urlInput.value = "";

        if (link.dataset.url) {
          urlInput.value = link.dataset.url;
        } else if (link.dataset.pkg) {
          tomlInput.value = `[project]\nname = "example"\ndependencies = ["${link.dataset.pkg}"]`;
        } else if (link.dataset.toml) {
          const pkgs = link.dataset.toml.split("\n").map(p => `"${p.trim()}"`).join(", ");
          tomlInput.value = `[project]\nname = "example"\ndependencies = [${pkgs}]`;
        }
        runBuild();
      });
    });
  </script>
</body>
</html>
