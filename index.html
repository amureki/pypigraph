<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pypigraph · Python Package Dependency Graphs</title>
  <meta name="description" content="Visualize Python package dependency graphs from pyproject.toml. Explore dependencies, licenses, freshness, and sizes.">
  <meta property="og:title" content="pypigraph">
  <meta property="og:description" content="Visualize Python package dependency graphs from pyproject.toml. Explore dependencies, licenses, freshness, and sizes.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://amureki.github.io/pypigraph/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="pypigraph">
  <meta name="twitter:description" content="Visualize Python package dependency graphs from pyproject.toml.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='8' cy='8' r='3' fill='%232563eb'/><circle cx='24' cy='8' r='3' fill='%2322c55e'/><circle cx='16' cy='24' r='3' fill='%23f59e0b'/><line x1='8' y1='8' x2='24' y2='8' stroke='%236e7781' stroke-width='1.5'/><line x1='8' y1='8' x2='16' y2='24' stroke='%236e7781' stroke-width='1.5'/><line x1='24' y1='8' x2='16' y2='24' stroke='%236e7781' stroke-width='1.5'/></svg>">
  <script defer src="https://t.rsts.me/script.js" data-website-id="da47a11e-b938-4575-b78b-7c2d7b4deccd"></script>
  <script>
    // Apply saved theme immediately to prevent flash of light mode
    (function() {
      var t = localStorage.getItem("pypigraph-theme");
      if (t && t !== "auto") document.documentElement.setAttribute("data-theme", t);
      // If URL has params, we know a build is coming — mark it so CSS can show loading state
      var p = new URLSearchParams(location.search);
      if (p.has("pkg") || p.has("url")) document.documentElement.setAttribute("data-loading", "");
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button id="mobile-sidebar-toggle" aria-label="Toggle sidebar">&#9776;</button>
    <h1>pypigraph<span id="header-context"></span></h1>
    <div id="stats-bar"></div>
    <div class="header-right" role="group" aria-label="Color theme">
      <div class="theme-switcher">
        <div class="theme-switcher-indicator"></div>
        <button class="theme-btn" data-theme="auto">Auto</button>
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="dark">Dark</button>
      </div>
    </div>
  </header>
  <div id="main-area">
    <aside id="sidebar">
      <div id="sidebar-tabs" role="tablist">
        <button class="sidebar-tab active" data-tab="input" role="tab" aria-selected="true" aria-controls="tab-input" id="tab-btn-input">Input</button>
        <button class="sidebar-tab" data-tab="graph" role="tab" aria-selected="false" aria-controls="tab-graph" id="tab-btn-graph">Graph</button>
        <button class="sidebar-tab" data-tab="module" role="tab" aria-selected="false" aria-controls="tab-module" id="tab-btn-module">Module</button>
      </div>
      <div id="tab-input" class="tab-panel active" role="tabpanel" aria-labelledby="tab-btn-input">
        <textarea id="toml-input" placeholder="Paste pyproject.toml contents..." aria-label="pyproject.toml contents"></textarea>
        <div class="input-group">
          <label for="url-input">Or fetch from URL</label>
          <input id="url-input" type="url" placeholder="https://github.com/user/repo/blob/main/pyproject.toml">
        </div>
        <div class="input-controls">
          <button id="go-btn">Build Graph</button>
        </div>
        <div id="input-hint"></div>
        <div id="status" aria-live="polite"></div>
        <div id="error" aria-live="assertive"></div>
        <div class="examples">
          <p>For example:</p>
          <p>A URL to a pyproject.toml: <a class="example-link" data-url="https://raw.githubusercontent.com/python/pythondotorg/refs/heads/main/pyproject.toml">pythondotorg</a></p>
          <p>A package name: <a class="example-link" data-pkg="fastapi">fastapi</a></p>
          <p>Multiple packages: <a class="example-link" data-toml="django&#10;celery&#10;requests">django, celery, requests</a></p>
        </div>
      </div>
      <div id="tab-graph" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-graph">
        <p class="module-empty">Build a graph first</p>
      </div>
      <div id="tab-module" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-module">
        <p class="module-empty">Click a package in the graph</p>
      </div>
      <div id="sidebar-footer">
        <span>by <a href="https://amureki.me" target="_blank">amureki</a></span>
        <span class="sep">|</span>
        <a href="https://github.com/amureki/pypigraph" target="_blank">GitHub</a>
        <span class="sep">|</span>
        <a href="https://github.com/sponsors/amureki" target="_blank">Sponsor</a>
        <span style="flex:1"></span>
        <button id="sidebar-toggle" aria-label="Hide sidebar">&#9666; hide sidebar</button>
      </div>
    </aside>
    <div id="sidebar-overlay"></div>
    <div id="graph-wrapper">
      <button id="sidebar-show" aria-label="Show sidebar">show sidebar &#9656;</button>
      <div id="empty-state">
        <svg class="empty-motif" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="30" y1="30" x2="90" y2="30" stroke="currentColor" stroke-width="2"/>
          <line x1="30" y1="30" x2="60" y2="95" stroke="currentColor" stroke-width="2"/>
          <line x1="90" y1="30" x2="60" y2="95" stroke="currentColor" stroke-width="2"/>
          <line x1="60" y1="95" x2="20" y2="75" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <line x1="60" y1="95" x2="100" y2="75" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <line x1="30" y1="30" x2="15" y2="55" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <line x1="90" y1="30" x2="105" y2="55" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <circle cx="30" cy="30" r="8" fill="#2563eb" opacity="0.8"/>
          <circle cx="90" cy="30" r="8" fill="#22c55e" opacity="0.8"/>
          <circle cx="60" cy="95" r="8" fill="#f59e0b" opacity="0.8"/>
          <circle cx="20" cy="75" r="5" fill="#a855f7" opacity="0.6"/>
          <circle cx="100" cy="75" r="5" fill="#ec4899" opacity="0.6"/>
          <circle cx="15" cy="55" r="4" fill="#3b82f6" opacity="0.5"/>
          <circle cx="105" cy="55" r="4" fill="#84cc16" opacity="0.5"/>
        </svg>
        <h2>pypigraph</h2>
        <p>Visualize Python package dependency graphs</p>
      </div>
      <div id="graph-container"></div>
      <div id="graph-search">
        <input id="search-input" type="search" placeholder="Search packages..." aria-label="Search packages in graph">
        <span id="search-count"></span>
      </div>
      <div id="zoom-controls">
        <span class="toolbar-label">Zoom</span>
        <button id="zoom-in" title="Zoom in" aria-label="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out" aria-label="Zoom out">&minus;</button>
        <button id="zoom-fit" title="Fit all" aria-label="Fit graph to view">Fit</button>
        <button id="zoom-reset" title="1:1" aria-label="Reset zoom to 100%">1:1</button>
        <span class="toolbar-sep"></span>
        <span class="toolbar-label">Layout</span>
        <select id="layout-select" title="Layout" aria-label="Graph layout">
          <option value="dot">Tree</option>
          <option value="twopi">Radial</option>
        </select>
        <span class="toolbar-sep"></span>
        <span class="toolbar-label">Color</span>
        <select id="color-select" title="Color by" aria-label="Color coding mode">
          <option value="depth">Depth</option>
          <option value="freshness">Freshness</option>
          <option value="license">License</option>
          <option value="size">Size</option>
        </select>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
