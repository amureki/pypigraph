<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pypigraph</title>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; }
    #stats-bar {
      font-size: 0.7rem;
      color: #666;
      display: none;
      gap: 1rem;
      flex-wrap: wrap;
    }
    #stats-bar.active { display: flex; }
    #stats-bar .stat b { color: #1a1a1a; }

    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 320px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .sidebar-tab {
      flex: 1;
      padding: 0.45rem;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 0.75rem;
      color: #666;
      border-bottom: 2px solid transparent;
    }
    .sidebar-tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 500; }
    .sidebar-tab:hover { background: #f5f5f5; }
    .tab-panel { display: none; padding: 0.75rem; overflow-y: auto; flex: 1; }
    .tab-panel.active { display: block; }

    /* Input tab */
    #toml-input {
      width: 100%;
      height: 180px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    .input-group { margin-top: 0.5rem; }
    .input-group label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 0.2rem; }
    #url-input {
      width: 100%;
      padding: 0.35rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .input-controls {
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .input-controls label { font-size: 0.75rem; color: #555; }
    #go-btn {
      flex: 1;
      padding: 0.4rem 0.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
    }
    #go-btn:hover { background: #1d4ed8; }
    #go-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    #status {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #555;
      display: none;
    }
    #status.active { display: block; }
    #error {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #dc2626;
      display: none;
    }
    #error.active { display: block; }

    /* Module tab */
    .module-empty { color: #999; font-size: 0.8rem; padding: 1rem 0; text-align: center; }
    .detail-row { padding: 0.35rem 0; border-bottom: 1px solid #f0f0f0; }
    .detail-label { color: #888; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .detail-value { margin-top: 0.1rem; word-break: break-word; font-size: 0.8rem; }
    .detail-value a { color: #2563eb; text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }
    .dep-list { list-style: none; padding: 0; font-size: 0.75rem; }
    .dep-list li { padding: 0.2rem 0; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.7rem; }
    .license-ok { color: #16a34a; }
    .license-warn { color: #d97706; }
    .license-unknown { color: #dc2626; }

    /* Graph tab */
    .graph-stats { font-size: 0.8rem; }
    .graph-stats dt { color: #888; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 0.5rem; }
    .graph-stats dd { margin: 0.1rem 0 0; }
    .license-table { width: 100%; font-size: 0.75rem; border-collapse: collapse; margin-top: 0.25rem; }
    .license-table td { padding: 0.2rem 0.25rem; border-bottom: 1px solid #f0f0f0; }
    .license-table td:last-child { text-align: right; color: #888; }
    .license-row { cursor: pointer; }
    .license-row:hover { background: #f5f5f5; }
    .license-row td:first-child::before { content: "▸ "; font-size: 0.6rem; color: #999; }
    .license-row.expanded td:first-child::before { content: "▾ "; }
    .license-packages { display: none; }
    .license-packages.active { display: table-row; }
    .license-packages td { padding: 0.3rem 0.5rem; background: #fafafa; }
    .license-packages ul { list-style: none; padding: 0; margin: 0; }
    .license-packages li { padding: 0.15rem 0; font-family: "SF Mono", "Fira Code", monospace; font-size: 0.7rem; cursor: pointer; color: #2563eb; }
    .license-packages li:hover { text-decoration: underline; }

    /* Graph area */
    #graph-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #zoom-controls {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      display: none;
      flex-direction: column;
      gap: 2px;
      z-index: 10;
    }
    #zoom-controls.active { display: flex; }
    #zoom-controls button {
      width: 28px;
      height: 28px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #zoom-controls button:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <header>
    <h1>pypigraph</h1>
    <div id="stats-bar"></div>
  </header>
  <div id="main-area">
    <aside id="sidebar">
      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="input">Input</button>
        <button class="sidebar-tab" data-tab="graph">Graph</button>
        <button class="sidebar-tab" data-tab="module">Module</button>
      </div>
      <div id="tab-input" class="tab-panel active">
        <textarea id="toml-input" placeholder="Paste pyproject.toml contents..."></textarea>
        <div class="input-group">
          <label>Or fetch from URL</label>
          <input id="url-input" type="url" placeholder="https://raw.githubusercontent.com/...">
        </div>
        <div class="input-controls">
          <label>Depth <input id="depth-input" type="number" min="1" max="10" value="2" style="width:3rem;padding:0.2rem;border:1px solid #ccc;border-radius:3px;font-size:0.75rem;"></label>
          <button id="go-btn">Build Graph</button>
        </div>
        <div id="status"></div>
        <div id="error"></div>
      </div>
      <div id="tab-graph" class="tab-panel">
        <p class="module-empty">Build a graph first</p>
      </div>
      <div id="tab-module" class="tab-panel">
        <p class="module-empty">Click a package in the graph</p>
      </div>
    </aside>
    <div id="graph-container">
      <div id="zoom-controls">
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">&minus;</button>
        <button id="zoom-fit" title="Fit all">Fit</button>
        <button id="zoom-reset" title="1:1">1:1</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { parse } from "https://cdn.jsdelivr.net/npm/smol-toml@1.3.1/+esm";

    const ROOT_ID = "__root__";

    function escapeHtml(str) {
      const el = document.createElement("span");
      el.textContent = str;
      return el.innerHTML;
    }

    // --- PEP 508 parsing ---
    function parsePep508(raw) {
      const match = raw.match(
        /^([A-Za-z0-9]([A-Za-z0-9._-]*[A-Za-z0-9])?)(\[([^\]]+)\])?\s*([^;]*?)(\s*;.*)?$/
      );
      if (!match) return { name: raw.trim(), extras: [], specifier: "", marker: "", raw };
      return {
        name: match[1],
        extras: match[4] ? match[4].split(",").map(e => e.trim()) : [],
        specifier: (match[5] || "").trim(),
        marker: match[6] ? match[6].replace(/^\s*;\s*/, "").trim() : "",
        raw,
      };
    }

    function normalizeName(name) {
      return name.toLowerCase().replace(/[-_.]+/g, "-");
    }

    function formatSize(bytes) {
      if (!bytes || bytes === 0) return "?";
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function classifyLicense(license) {
      if (!license || license === "Unknown") return "license-unknown";
      return license.match(/MIT|BSD|Apache|ISC|PSF|LGPL|MPL/i) ? "license-ok" : "license-warn";
    }

    function errorPackage(name) {
      return { name, version: "?", summary: "", license: "", size: 0, dependencies: [], error: true };
    }

    // --- TOML parsing ---
    function parseToml(tomlString) {
      const doc = parse(tomlString);
      const deps = doc.project?.dependencies ?? [];
      if (deps.length === 0) throw new Error("No dependencies found in [project].dependencies");
      return { name: doc.project?.name || "project", dependencies: deps.map(parsePep508) };
    }

    // --- PyPI fetcher ---
    const cache = new Map();

    async function fetchPackageInfo(name) {
      const normalized = normalizeName(name);
      if (cache.has(normalized)) return cache.get(normalized);

      const promise = (async () => {
        try {
          const resp = await fetch(`https://pypi.org/pypi/${normalized}/json`);
          if (!resp.ok) return errorPackage(normalized);
          const data = await resp.json();
          const info = data.info;
          const requires = (info.requires_dist ?? [])
            .map(parsePep508)
            .filter(d => !d.marker.includes("extra ==") && !d.marker.includes("extra=="));

          let size = 0;
          const urls = data.urls ?? [];
          const wheel = urls.find(u => u.packagetype === "bdist_wheel");
          const sdist = urls.find(u => u.packagetype === "sdist");
          size = (wheel || sdist)?.size || 0;

          const licenseClassifier = (info.classifiers ?? []).find(c => c.startsWith("License ::"));
          let license = info.license_expression
            || (licenseClassifier ? licenseClassifier.split(" :: ").pop() : "")
            || info.license
            || "";
          if (license.length > 80) license = license.slice(0, 80) + "...";

          return {
            name: info.name,
            version: info.version,
            summary: info.summary || "",
            license,
            size,
            projectUrls: info.project_urls || {},
            requiresPython: info.requires_python || "",
            dependencies: requires,
            error: false,
          };
        } catch {
          return errorPackage(normalized);
        }
      })();

      cache.set(normalized, promise);
      return promise;
    }

    // --- Concurrency limiter ---
    function semaphore(max) {
      let active = 0;
      const queue = [];
      return function limit(fn) {
        return new Promise((resolve, reject) => {
          const run = async () => {
            active++;
            try { resolve(await fn()); } catch (e) { reject(e); } finally {
              active--;
              if (queue.length) queue.shift()();
            }
          };
          if (active < max) run(); else queue.push(run);
        });
      };
    }
    const limit = semaphore(8);

    // --- Graph builder ---
    let lastGraph = null;

    async function buildGraph(rootDeps, projectName, maxDepth, onProgress) {
      const edgeSet = new Set();
      const edges = [];
      const nodes = new Map();

      nodes.set(ROOT_ID, { name: projectName, version: "", depth: 0, error: false, size: 0, license: "", dependencies: [], summary: "" });

      function addEdge(from, to) {
        const key = `${from}->${to}`;
        if (edgeSet.has(key)) return;
        edgeSet.add(key);
        edges.push({ from, to });
      }

      async function resolve(depName, parentKey, depth) {
        if (depth > maxDepth) return;
        const key = normalizeName(depName);
        addEdge(parentKey, key);
        if (nodes.has(key)) return;
        nodes.set(key, null); // reserve to prevent duplicate fetches

        onProgress(`Fetching ${depName}... (${nodes.size - 1} packages)`);
        const info = await limit(() => fetchPackageInfo(key));
        nodes.set(key, { ...info, depth });

        await Promise.all(
          info.dependencies.map(d => resolve(d.name, key, depth + 1))
        );
      }

      await Promise.all(
        rootDeps.map(d => resolve(d.name, ROOT_ID, 1))
      );

      return { nodes, edges };
    }

    // --- Cytoscape rendering ---
    const depthColors = ["#22c55e", "#3b82f6", "#f59e0b", "#a855f7", "#ec4899"];
    let cy = null;

    function renderGraph(graph) {
      const dependedBy = new Map();
      for (const { to } of graph.edges) {
        dependedBy.set(to, (dependedBy.get(to) || 0) + 1);
      }

      const elements = [];

      for (const [id, node] of graph.nodes) {
        if (!node) continue;
        const count = dependedBy.get(id) || 0;
        const countLabel = count > 1 ? ` (${count})` : "";
        const sizeLabel = node.size ? `\n${formatSize(node.size)}` : "";
        const nameVersion = node.version ? `${node.name}@${node.version}` : node.name;
        const color = depthColors[Math.min(node.depth, depthColors.length - 1)];

        elements.push({
          group: "nodes",
          data: {
            id,
            label: `${nameVersion}${countLabel}${sizeLabel}`,
            depth: node.depth,
            color,
            borderColor: node.error ? "#dc2626" : color,
            borderWidth: node.depth === 0 ? 3 : count > 3 ? 2.5 : 1.5,
          },
        });
      }

      for (const { from, to } of graph.edges) {
        elements.push({
          group: "edges",
          data: { source: from, target: to },
        });
      }

      cy = cytoscape({
        container: document.getElementById("graph-container"),
        elements,
        style: [
          {
            selector: "node",
            style: {
              label: "data(label)",
              "text-valign": "center",
              "text-halign": "center",
              "font-size": "9px",
              "font-family": "system-ui, -apple-system, sans-serif",
              "text-wrap": "wrap",
              "text-max-width": "140px",
              shape: "roundrectangle",
              width: "label",
              height: "label",
              padding: "6px",
              "background-color": "data(color)",
              "background-opacity": 0.12,
              "border-color": "data(borderColor)",
              "border-width": "data(borderWidth)",
              color: "#1a1a1a",
            },
          },
          {
            selector: "node:selected",
            style: {
              "background-opacity": 0.3,
              "border-width": 3,
              "border-color": "#2563eb",
            },
          },
          {
            selector: "edge",
            style: {
              width: 1,
              "line-color": "#ccc",
              "target-arrow-color": "#bbb",
              "target-arrow-shape": "triangle",
              "arrow-scale": 0.6,
              "curve-style": "bezier",
            },
          },
          {
            selector: "edge.highlighted",
            style: {
              "line-color": "#2563eb",
              "target-arrow-color": "#2563eb",
              width: 2,
            },
          },
          {
            selector: "node.dimmed",
            style: { opacity: 0.2 },
          },
          {
            selector: "edge.dimmed",
            style: { opacity: 0.1 },
          },
        ],
        layout: {
          name: "dagre",
          rankDir: "LR",
          nodeSep: 30,
          rankSep: 60,
          edgeSep: 10,
        },
        minZoom: 0.1,
        maxZoom: 3,
        wheelSensitivity: 0.3,
      });

      // Click node → show sidebar + highlight connections
      cy.on("tap", "node", e => {
        const nodeId = e.target.id();
        highlightConnections(e.target);
        showModule(nodeId);
      });

      // Click background → clear highlight
      cy.on("tap", e => {
        if (e.target === cy) {
          cy.elements().removeClass("dimmed highlighted");
          cy.edges().removeClass("highlighted");
        }
      });
    }

    // --- Zoom controls ---
    document.getElementById("zoom-in").addEventListener("click", () => { if (cy) cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } }); });
    document.getElementById("zoom-out").addEventListener("click", () => { if (cy) cy.zoom({ level: cy.zoom() / 1.3, renderedPosition: { x: cy.width() / 2, y: cy.height() / 2 } }); });
    document.getElementById("zoom-fit").addEventListener("click", () => { if (cy) cy.fit(undefined, 30); });
    document.getElementById("zoom-reset").addEventListener("click", () => { if (cy) { cy.zoom(1); cy.center(); } });

    function highlightConnections(node) {
      cy.elements().addClass("dimmed");
      // Get all connected upstream and downstream
      const connected = node.predecessors().union(node.successors()).union(node);
      connected.removeClass("dimmed");
      connected.edges().removeClass("dimmed").addClass("highlighted");
      node.removeClass("dimmed");
    }

    // --- Stats ---
    function computeStats(graph) {
      let direct = 0, transitive = 0, errors = 0, totalSize = 0;
      const licenses = new Map();

      for (const [id, node] of graph.nodes) {
        if (!node || id === ROOT_ID) continue;
        if (node.depth === 1) direct++; else transitive++;
        if (node.error) errors++;
        totalSize += node.size || 0;
        const lic = node.license || "Unknown";
        licenses.set(lic, (licenses.get(lic) || 0) + 1);
      }

      return { direct, transitive, errors, totalSize, licenses };
    }

    function renderStatsBar(stats) {
      const bar = document.getElementById("stats-bar");
      bar.innerHTML = [
        `<span class="stat"><b>${stats.direct}</b> direct</span>`,
        `<span class="stat"><b>${stats.transitive}</b> transitive</span>`,
        `<span class="stat"><b>${stats.direct + stats.transitive}</b> total</span>`,
        `<span class="stat"><b>${formatSize(stats.totalSize)}</b> size</span>`,
        stats.errors > 0 ? `<span class="stat" style="color:#dc2626"><b>${stats.errors}</b> errors</span>` : "",
      ].join("");
      bar.classList.add("active");
    }

    function packagesByLicense(graph) {
      const map = new Map();
      for (const [id, node] of graph.nodes) {
        if (!node || id === ROOT_ID) continue;
        const lic = node.license || "Unknown";
        if (!map.has(lic)) map.set(lic, []);
        map.get(lic).push({ id, name: node.name });
      }
      return map;
    }

    function renderGraphTab(stats) {
      const tab = document.getElementById("tab-graph");
      const pkgsByLic = packagesByLicense(lastGraph);
      const sortedLicenses = [...stats.licenses.entries()].sort((a, b) => b[1] - a[1]);

      const licRows = sortedLicenses.map(([lic, count], i) => {
        const pkgs = pkgsByLic.get(lic) || [];
        const pkgItems = pkgs.map(p =>
          `<li data-pkg-id="${escapeHtml(p.id)}">${escapeHtml(p.name)}</li>`
        ).join("");
        return `<tr class="license-row" data-lic-idx="${i}"><td class="${classifyLicense(lic)}">${escapeHtml(lic || "Unknown")}</td><td>${count}</td></tr>` +
          `<tr class="license-packages" data-lic-idx="${i}"><td colspan="2"><ul>${pkgItems}</ul></td></tr>`;
      }).join("");

      tab.innerHTML = `
        <dl class="graph-stats">
          <dt>Direct dependencies</dt><dd>${stats.direct}</dd>
          <dt>Transitive dependencies</dt><dd>${stats.transitive}</dd>
          <dt>Total packages</dt><dd>${stats.direct + stats.transitive}</dd>
          <dt>Total download size</dt><dd>${formatSize(stats.totalSize)}</dd>
          ${stats.errors > 0 ? `<dt>Fetch errors</dt><dd style="color:#dc2626">${stats.errors}</dd>` : ""}
          <dt>Licenses (${stats.licenses.size} unique)</dt>
          <dd><table class="license-table">${licRows}</table></dd>
        </dl>
      `;

      tab.querySelectorAll(".license-row").forEach(row => {
        row.addEventListener("click", () => {
          const idx = row.dataset.licIdx;
          const detail = tab.querySelector(`.license-packages[data-lic-idx="${idx}"]`);
          row.classList.toggle("expanded");
          detail.classList.toggle("active");
        });
      });

      tab.querySelectorAll(".license-packages li[data-pkg-id]").forEach(li => {
        li.addEventListener("click", () => {
          showModule(li.dataset.pkgId);
          if (cy) {
            const node = cy.getElementById(li.dataset.pkgId);
            if (node.length) highlightConnections(node);
          }
        });
      });
    }

    // --- Sidebar: Module tab ---
    function detailRow(label, value, extraClass = "") {
      return `<div class="detail-row"><div class="detail-label">${label}</div><div class="detail-value ${extraClass}">${value}</div></div>`;
    }

    function showModule(nodeId) {
      if (!lastGraph) return;
      const node = lastGraph.nodes.get(nodeId);
      if (!node || nodeId === ROOT_ID) return;

      const tab = document.getElementById("tab-module");

      const usedBy = lastGraph.edges.filter(e => e.to === nodeId).map(e => {
        const n = lastGraph.nodes.get(e.from);
        return n ? n.name : e.from;
      });

      const pypiUrl = `https://pypi.org/project/${encodeURIComponent(normalizeName(node.name))}/`;
      const urls = node.projectUrls || {};
      const linksHtml = Object.entries(urls).map(([k, v]) => {
        const safeUrl = v.match(/^https?:\/\//) ? v : "#";
        return `<a href="${escapeHtml(safeUrl)}" target="_blank">${escapeHtml(k)}</a>`;
      }).join(" &middot; ");

      const deps = node.dependencies || [];
      const depsHtml = deps.length === 0
        ? '<p style="color:#999;margin-top:0.5rem;">No dependencies</p>'
        : `<ul class="dep-list">${deps.map(d => `<li>${escapeHtml(d.raw)}</li>`).join("")}</ul>`;

      const rows = [
        detailRow("Package", `<b>${escapeHtml(node.name)}</b>`),
        detailRow("Version", escapeHtml(node.version || "?")),
        detailRow("Summary", escapeHtml(node.summary || "-")),
        detailRow("License", escapeHtml(node.license || "Unknown"), classifyLicense(node.license)),
        detailRow("Size", formatSize(node.size)),
      ];
      if (node.requiresPython) {
        rows.push(detailRow("Python requires", escapeHtml(node.requiresPython)));
      }
      rows.push(
        detailRow("Links", `<a href="${pypiUrl}" target="_blank">PyPI</a>${linksHtml ? " &middot; " + linksHtml : ""}`),
        detailRow(`Used by (${usedBy.length})`, escapeHtml(usedBy.join(", ") || "-")),
        `<div class="detail-row"><div class="detail-label">Dependencies (${deps.length})</div>${depsHtml}</div>`,
      );

      tab.innerHTML = rows.join("");
      switchTab("module");
    }

    // --- Tab switching ---
    function switchTab(name) {
      document.querySelectorAll(".sidebar-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
      document.querySelectorAll(".tab-panel").forEach(t => t.classList.toggle("active", t.id === "tab-" + name));
    }

    // --- UI wiring ---
    document.querySelectorAll(".sidebar-tab").forEach(tab => {
      tab.addEventListener("click", () => switchTab(tab.dataset.tab));
    });

    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.toggle("active", !!msg);
    }
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.toggle("active", !!msg);
    }

    async function getTomlInput() {
      const text = document.getElementById("toml-input").value.trim();
      if (text) return text;
      const url = document.getElementById("url-input").value.trim();
      if (url) {
        showStatus("Fetching pyproject.toml...");
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`Failed to fetch URL: ${resp.status}`);
        return await resp.text();
      }
      throw new Error("Paste pyproject.toml contents or provide a URL");
    }

    document.getElementById("go-btn").addEventListener("click", async () => {
      const goBtn = document.getElementById("go-btn");
      showError("");
      goBtn.disabled = true;
      cache.clear();

      try {
        const toml = await getTomlInput();
        const parsed = parseToml(toml);

        const maxDepth = Math.max(1, Math.min(10, parseInt(document.getElementById("depth-input").value) || 2));
        const graph = await buildGraph(parsed.dependencies, parsed.name, maxDepth, showStatus);
        lastGraph = graph;

        showStatus("Rendering graph...");
        if (cy) cy.destroy();
        renderGraph(graph);
        document.getElementById("zoom-controls").classList.add("active");

        const stats = computeStats(graph);
        renderStatsBar(stats);
        renderGraphTab(stats);
        showStatus("");
        switchTab("graph");
      } catch (e) {
        showError(e.message);
        showStatus("");
      } finally {
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
